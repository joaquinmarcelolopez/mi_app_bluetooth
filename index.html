<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CaranchoNET LoRa</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100dvh; /* Altura dinámica para Android */
            width: 100vw;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e5ddd5;
        }

        header {
            flex: 0 0 50px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Scroll suave en móviles */
            -webkit-overflow-scrolling: touch;
        }

        .input-area {
            flex: 0 0 auto;
            background-color: #f0f0f0;
            /* El padding de 30px abajo es el "seguro" para que el botón no quede fuera */
            padding: 10px 10px 30px 10px; 
            display: flex;
            gap: 8px;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            height: 44px;
            border-radius: 22px;
            border: 1px solid #bbb;
            padding: 0 15px;
            font-size: 16px; /* Evita zoom automático */
            outline: none;
        }

        button {
            height: 44px;
            border-radius: 22px;
            border: none;
            background-color: #27ae60;
            color: white;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Estilo básico de burbuja para ver algo */
        .msg {
            background: white;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 80%;
            align-self: flex-start;
        }
    </style>
</head>
<body>

    <header>
        <strong>CaranchoNET LoRa</strong>
    </header>
    
    <div id="chat-container">
        <div class="msg">Bienvenido al sistema de mensajería RN9.</div>
        <div class="msg">Esperando conexión LoRa...</div>
    </div>

    <div class="input-area">
        <input type="text" id="mensaje" placeholder="Escribe aquí...">
        <button onclick="enviar()">ENVIAR</button>
    </div>

    <script>
        function enviar() {
            const input = document.getElementById('mensaje');
            if(input.value.trim() !== "") {
                const chat = document.getElementById('chat-container');
                const nuevoMsg = document.createElement('div');
                nuevoMsg.className = 'msg';
                nuevoMsg.style.alignSelf = 'flex-end';
                nuevoMsg.style.backgroundColor = '#dcf8c6';
                nuevoMsg.innerText = input.value;
                chat.appendChild(nuevoMsg);
                input.value = "";
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
