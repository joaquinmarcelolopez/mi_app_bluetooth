<script>
    // 1. FORZAR ACTUALIZACIÓN AL ABRIR
    // Esto busca si el archivo en GitHub cambió y lo descarga de inmediato
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // Si hay una versión nueva, recarga la página solo una vez
                            window.location.reload();
                        }
                    };
                };
            });
        });
    }

    // 2. LÓGICA DE NAVEGACIÓN
    function switchView(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        btn.classList.add('active');
    }

    // 3. PERSISTENCIA DE MENSAJES (Sincronizada con CaranchoNET)
    const chat = document.getElementById('chat-container');
    const input = document.getElementById('mensaje');

    window.onload = () => {
        // Al cargar, siempre bajamos al final del chat
        const guardados = JSON.parse(localStorage.getItem('historial_carancho')) || [];
        guardados.forEach(msg => agregarMensajeALaPantalla(msg.texto, msg.tipo));
        chat.scrollTop = chat.scrollHeight;
    };

    function enviar() {
        const texto = input.value.trim();
        if(texto !== "") {
            agregarMensajeALaPantalla(texto, 'sent');
            
            const historial = JSON.parse(localStorage.getItem('historial_carancho')) || [];
            historial.push({ texto, tipo: 'sent', fecha: Date.now() });
            localStorage.setItem('historial_carancho', JSON.stringify(historial));

            input.value = "";
            // Pequeño delay para asegurar que el DOM se actualizó antes de scrollear
            setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
        }
    }

    function agregarMensajeALaPantalla(texto, tipo) {
        const nuevoMsg = document.createElement('div');
        nuevoMsg.className = 'msg';
        nuevoMsg.style.alignSelf = (tipo === 'sent') ? 'flex-end' : 'flex-start';
        nuevoMsg.style.backgroundColor = (tipo === 'sent') ? '#27ae60' : 'white';
        nuevoMsg.style.color = (tipo === 'sent') ? 'white' : 'black';
        nuevoMsg.innerText = texto;
        chat.appendChild(nuevoMsg);
    }

    function borrarHistorial() {
        if(confirm("¿Estás seguro de vaciar el historial de CaranchoNET?")) {
            localStorage.removeItem('historial_carancho');
            window.location.reload(); // Esto limpia la vista y fuerza la recarga del caché
        }
    }

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") enviar(); });
</script>
