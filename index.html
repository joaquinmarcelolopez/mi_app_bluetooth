<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería RN9 - LoRa</title>
    <!-- Dexie.js para la base de datos local -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Cabecera */
        header {
            background-color: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Área de Mensajes */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            position: relative;
            line-height: 1.4;
        }

        .sent {
            align-self: flex-end;
            background-color: var(--accent);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .meta {
            font-size: 0.7rem;
            margin-top: 5px;
            opacity: 0.8;
            text-align: right;
        }

        /* Barra de entrada */
        .input-area {
            background: white;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        button:active { transform: scale(0.95); }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background: #2ecc71; }
        .offline { background: #e74c3c; }
    </style>
</head>
<body>

<header>
    <strong>Ruta LoRa - Mensajería</strong>
    <div style="font-size: 0.8rem; margin-top: 5px;">
        <span id="status-icon" class="status-dot"></span>
        <span id="status-text">Detectando conexión...</span>
    </div>
</header>

<div id="chat-container">
    <!-- Los mensajes aparecerán aquí -->
</div>

<div class="input-area">
    <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
    <button onclick="enviarMensaje()">Enviar</button>
</div>

<script>
    // 1. Configurar Base de Datos Local con Dexie
    const db = new Dexie("ChatRuta9");
    db.version(1).stores({
        mensajes: '++id, fecha, texto, emisor, via'
    });

    const chatContainer = document.getElementById('chat-container');
    const msgInput = document.getElementById('msg-input');

    // 2. Cargar historial al iniciar
    async function cargarHistorial() {
        const historial = await db.mensajes.orderBy('fecha').toArray();
        chatContainer.innerHTML = '';
        historial.forEach(m => mostrarEnPantalla(m));
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 3. Mostrar mensaje en la interfaz
    function mostrarEnPantalla(m) {
        const div = document.createElement('div');
        div.className = `message sent`;
        const hora = new Date(m.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        div.innerHTML = `
            <div>${m.texto}</div>
            <div class="meta">${hora} • via ${m.via}</div>
        `;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 4. Lógica de Envío
    async function enviarMensaje() {
        const texto = msgInput.value.trim();
        if (!texto) return;

        // Detectar vía de envío (Simulada)
        const via = navigator.onLine ? "Internet" : "Bluetooth/LoRa";

        const nuevoMensaje = {
            texto: texto,
            fecha: Date.now(),
            emisor: "Usuario",
            via: via
        };

        // Guardar en Base de Datos Local
        await db.mensajes.add(nuevoMensaje);
        
        // Mostrar en pantalla
        mostrarEnPantalla(nuevoMensaje);
        
        // Limpiar input
        msgInput.value = '';

        console.log("Mensaje guardado localmente y enviado vía " + via);
    }

    // 5. Detectar estado de conexión
    function actualizarEstado() {
        const dot = document.getElementById('status-icon');
        const txt = document.getElementById('status-text');
        if (navigator.onLine) {
            dot.className = "status-dot online";
            txt.innerText = "En línea (Internet)";
        } else {
            dot.className = "status-dot offline";
            txt.innerText = "Modo Offline (LoRa)";
        }
    }

    window.addEventListener('online', actualizarEstado);
    window.addEventListener('offline', actualizarEstado);
    
    // Iniciar
    actualizarEstado();
    cargarHistorial();

    // Enviar con la tecla Enter
    msgInput.addEventListener("keyup", (e) => {
        if (e.key === "Enter") enviarMensaje();
    });
</script>

</body>
</html>
