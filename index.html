<style>
    /* ... (resto del CSS igual) ... */

    header {
        flex: 0 0 auto;
        background-color: var(--primary);
        color: white;
        padding: 10px 15px;
        z-index: 10;
        /* BLOQUEO DE INTERACCIÓN: Evita que Android intente "analizar" el texto */
        user-select: none; 
        -webkit-user-select: none;
        touch-action: manipulation;
    }

    .status-bar {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        font-size: 10px;
        text-align: center;
        border-top: 1px solid rgba(255,255,255,0.1);
        padding-top: 8px;
        /* Evita que los toques aquí disparen funciones del sistema */
        pointer-events: none; 
    }

    .status-item span { display: block; color: #bdc3c7; }
    .status-item b { color: var(--accent); }
    
    /* Re-activamos los eventos solo para el botón de borrar si lo necesitas */
    .clear-btn { pointer-events: auto; }
</style>

<header>
    <div class="header-top">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-tower-broadcast"></i>
            <strong style="font-size: 1.2rem;">CaranchoNET</strong>
        </div>
        <!-- Usamos un div simple en vez de etiquetas que parezcan botones -->
        <div style="font-size: 11px; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 10px;">
            <i class="fas fa-location-dot"></i> Tafí Viejo
        </div>
    </div>
    <div class="status-bar">
        <div class="status-item"><span>Señal:</span><b>EXCELENTE</b></div>
        <div class="status-item"><span>Modo:</span><b>ACTIVO</b></div>
        <div class="status-item"><span>Batería:</span><b>85%</b></div>
    </div>
</header>
