<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CaranchoNET LoRa</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; position: fixed;
            display: flex; flex-direction: column;
            font-family: sans-serif; background-color: #e5ddd5;
        }
        header {
            flex: 0 0 50px; background-color: #2c3e50; color: white;
            padding: 0 15px; display: flex; align-items: center;
            justify-content: space-between; z-index: 10;
        }
        #chat-container {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .input-area {
            flex: 0 0 auto; background-color: #f0f0f0;
            padding: 10px 10px 35px 10px; 
            display: flex; gap: 8px; border-top: 1px solid #ccc;
        }
        input { flex: 1; height: 44px; border-radius: 22px; border: 1px solid #bbb; padding: 0 15px; font-size: 16px; outline: none; }
        button { height: 44px; border-radius: 22px; border: none; background-color: #27ae60; color: white; padding: 0 20px; font-weight: bold; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; font-size: 0.95rem; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .clear-btn { background: none; border: 1px solid #ecf0f1; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>
    <header>
        <strong>CaranchoNET</strong>
        <button class="clear-btn" onclick="borrarHistorial()">BORRAR CHAT</button>
    </header>
    <div id="chat-container"></div>
    <div class="input-area">
        <input type="text" id="mensaje" placeholder="Escribe un mensaje..." autocomplete="off">
        <button onclick="enviar()">ENVIAR</button>
    </div>

    <script>
        // FORZAR ACTUALIZACIÓN DEL SERVICE WORKER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for(let registration of registrations) { registration.update(); }
            });
        }

        const chat = document.getElementById('chat-container');
        const input = document.getElementById('mensaje');

        window.onload = () => {
            const guardados = JSON.parse(localStorage.getItem('historial_carancho')) || [];
            console.log("Cargando mensajes:", guardados); // Para debug en PC
            guardados.forEach(msg => agregarMensajeALaPantalla(msg.texto, msg.tipo));
            chat.scrollTop = chat.scrollHeight;
        };

        function enviar() {
            const texto = input.value.trim();
            if(texto !== "") {
                agregarMensajeALaPantalla(texto, 'sent');
                
                // GUARDADO EXPLÍCITO
                const historial = JSON.parse(localStorage.getItem('historial_carancho')) || [];
                historial.push({ texto, tipo: 'sent', fecha: Date.now() });
                localStorage.setItem('historial_carancho', JSON.stringify(historial));

                input.value = "";
                chat.scrollTop = chat.scrollHeight;
            }
        }

        function agregarMensajeALaPantalla(texto, tipo) {
            const nuevoMsg = document.createElement('div');
            nuevoMsg.className = 'msg';
            nuevoMsg.style.alignSelf = (tipo === 'sent') ? 'flex-end' : 'flex-start';
            nuevoMsg.style.backgroundColor = (tipo === 'sent') ? '#dcf8c6' : 'white';
            nuevoMsg.innerText = texto;
            chat.appendChild(nuevoMsg);
        }

        function borrarHistorial() {
            if(confirm("¿Borrar chat?")) {
                localStorage.removeItem('historial_carancho');
                location.reload(); 
            }
        }

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") enviar(); });
    </script>
</body>
</html>
