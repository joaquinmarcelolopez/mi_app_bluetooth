<style>
    /* 1. CLAVAMOS EL FONDO Y QUITAMOS SCROLL GENERAL */
    html, body {
        margin: 0;
        padding: 0;
        /* Usamos '100vh' para forzar que sea exactamente el alto de la ventana visible,
           restando el espacio que ocupa la barra de URL de Android. */
        height: 100vh;
        width: 100vw;
        overflow: hidden; /* Prohibido el scroll en el cuerpo principal */
        position: fixed; /* Evita rebotes al deslizar */
        display: flex;
        flex-direction: column;
        background-color: #f4f7f6; /* Color de fondo suave */
    }

    /* 2. HEADER COMPACTO */
    header {
        flex-shrink: 0;
        height: 50px; /* Reducimos la altura (antes quizás 60-70px) */
        background-color: #2c3e50;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        z-index: 10;
    }

    header h1 {
        margin: 0;
        font-size: 1.2rem; /* Texto un poco más chico */
    }

    /* 3. EL CHAT: ÚNICA ZONA CON SCROLL */
    #chat-container {
        flex: 1; /* Toma todo el espacio disponible entre header e input */
        overflow-y: auto; /* Solo permitimos scroll vertical aquí */
        padding: 10px; /* Padding más compacto */
        display: flex;
        flex-direction: column;
        gap: 8px; /* Espacio entre mensajes más chico */
        /* Suaviza el scroll en móviles */
        -webkit-overflow-scrolling: touch;
    }

    /* Estilo de mensajes (compactos) */
    .message {
        max-width: 85%;
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 0.95rem;
        line-height: 1.3;
    }
    .message.sent { align-self: flex-end; background-color: #27ae60; color: white; }
    .message.received { align-self: flex-start; background-color: #ecf0f1; color: #333; }

    /* 4. ÁREA DE ENTRADA MUY COMPACTA */
    .input-area {
        flex-shrink: 0;
        height: 60px; /* Reducimos la altura (antes quizás 80px) */
        background-color: white;
        display: flex;
        align-items: center;
        padding: 0 10px;
        border-top: 1px solid #ddd;
        gap: 8px;
        box-sizing: border-box; /* Importante para que el padding no sume altura */
    }

    .input-area input {
        flex: 1;
        height: 40px; /* Input más bajo */
        padding: 0 15px;
        border: 1px solid #ccc;
        border-radius: 20px;
        font-size: 16px; /* Mantenemos 16px para evitar zoom automático en iOS */
    }

    .input-area button {
        height: 40px;
        padding: 0 20px;
        border-radius: 20px;
        background-color: #27ae60;
        color: white;
        border: none;
        font-weight: bold;
        font-size: 0.9rem;
    }
</style>
