<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CaranchoNET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #e5ddd5; }
        
        html, body {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; position: fixed;
            display: flex; flex-direction: column;
            font-family: sans-serif; background-color: var(--bg);
        }

        header {
            flex: 0 0 auto; background: var(--primary); color: white;
            padding: 10px 15px; user-select: none;
        }

        .status-bar {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            font-size: 10px; text-align: center; margin-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;
            pointer-events: none;
        }

        main { flex: 1; overflow-y: auto; position: relative; }
        .view { display: none; height: 100%; flex-direction: column; }
        .view.active { display: flex; }

        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; font-size: 0.95rem; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }

        .input-area {
            flex: 0 0 auto; background: white;
            padding: 10px 10px 35px 10px; display: flex; gap: 8px; border-top: 1px solid #ddd;
        }

        input { flex: 1; height: 40px; border-radius: 20px; border: 1px solid #ccc; padding: 0 15px; font-size: 16px; outline: none; }
        
        .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; border: none; }

        nav {
            flex: 0 0 65px; background: #f8f9fa;
            display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #ddd;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7f8c8d; font-size: 11px; border: none; background: none; }
        .nav-item.active { color: var(--primary); border-top: 2px solid var(--primary); }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong style="font-size: 1.1rem;"><i class="fas fa-tower-broadcast"></i> CaranchoNET</strong>
            <span style="font-size: 10px; opacity: 0.8;">Tafí Viejo</span>
        </div>
        <div class="status-bar">
            <div>Señal: <b style="color:var(--accent)">EXC</b></div>
            <div>Modo: <b style="color:var(--accent)">ACTIVO</b></div>
            <div>Bat: <b style="color:var(--accent)">85%</b></div>
        </div>
    </header>

    <main>
        <section id="view-mensajes" class="view active">
            <div id="chat-container"></div>
            <div class="input-area">
                <input type="text" id="mensaje" placeholder="Mensaje..." autocomplete="off">
                <button class="send-btn" onclick="enviar()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

        <section id="view-telemetria" class="view">
            <div style="padding:20px; text-align:center; color:#7f8c8d;">
                <i class="fas fa-microchip fa-3x"></i>
                <p>Telemetría en tiempo real</p>
            </div>
        </section>

        <section id="view-cuenta" class="view">
            <div style="padding:20px; text-align:center;">
                <button onclick="borrarHistorial()" style="color:red; border:1px solid red; background:none; padding:10px; border-radius:5px;">LIMPIAR DATOS APP</button>
            </div>
        </section>
    </main>

    <nav>
        <button class="nav-item active" onclick="switchView('mensajes', this)"><i class="fas fa-comment"></i> Mensajes</button>
        <button class="nav-item" onclick="switchView('telemetria', this)"><i class="fas fa-broadcast-tower"></i> Telemetría</button>
        <button class="nav-item" onclick="switchView('cuenta', this)"><i class="fas fa-cog"></i> Ajustes</button>
    </nav>

    <script>
        // Cambiar pestañas
        function switchView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            btn.classList.add('active');
        }

        const chat = document.getElementById('chat-container');
        const input = document.getElementById('mensaje');

        // Cargar mensajes
        window.onload = () => {
            try {
                const guardados = JSON.parse(localStorage.getItem('historial_carancho')) || [];
                guardados.forEach(msg => agregarMensajeALaPantalla(msg.texto, msg.tipo));
                chat.scrollTop = chat.scrollHeight;
            } catch(e) { console.error("Error cargando historial"); }
        };

        function enviar() {
            const texto = input.value.trim();
            if(texto !== "") {
                agregarMensajeALaPantalla(texto, 'sent');
                const historial = JSON.parse(localStorage.getItem('historial_carancho')) || [];
                historial.push({ texto, tipo: 'sent', fecha: Date.now() });
                localStorage.setItem('historial_carancho', JSON.stringify(historial));
                input.value = "";
                setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
            }
        }

        function agregarMensajeALaPantalla(texto, tipo) {
            const nuevoMsg = document.createElement('div');
            nuevoMsg.className = 'msg';
            nuevoMsg.style.alignSelf = (tipo === 'sent') ? 'flex-end' : 'flex-start';
            nuevoMsg.style.backgroundColor = (tipo === 'sent') ? '#27ae60' : 'white';
            nuevoMsg.style.color = (tipo === 'sent') ? 'white' : 'black';
            nuevoMsg.innerText = texto;
            chat.appendChild(nuevoMsg);
        }

        function borrarHistorial() {
            if(confirm("¿Restablecer aplicación?")) {
                localStorage.clear();
                window.location.reload();
            }
        }
    </script>
</body>
</html>
