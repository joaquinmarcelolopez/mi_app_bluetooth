<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CaranchoNET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #e5ddd5;
            --nav-bg: #f8f9fa;
        }

        html, body {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; position: fixed;
            display: flex; flex-direction: column;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
        }

        /* ENCABEZADO ESTILO DASHBOARD */
        header {
            flex: 0 0 auto;
            background-color: var(--primary);
            color: white;
            padding: 10px 15px;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .status-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            font-size: 10px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 8px;
        }

        .status-item span { display: block; color: #bdc3c7; }
        .status-item b { color: var(--accent); }

        /* CONTENEDOR PRINCIPAL DE PANTALLAS */
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        .view { display: none; height: 100%; flex-direction: column; }
        .view.active { display: flex; }

        /* PANTALLA DE CHAT */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 0.95rem;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .input-area {
            flex: 0 0 auto;
            background-color: white;
            padding: 10px 10px 15px 10px; 
            display: flex; gap: 8px;
            border-top: 1px solid #ddd;
        }

        input { flex: 1; height: 40px; border-radius: 20px; border: 1px solid #ccc; padding: 0 15px; font-size: 16px; outline: none; }
        
        .send-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background-color: var(--primary); color: white;
            border: none; display: flex; align-items: center; justify-content: center;
        }

        /* NAVEGACIÓN INFERIOR */
        nav {
            flex: 0 0 70px;
            background-color: var(--nav-bg);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-top: 1px solid #ddd;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            font-size: 12px;
            text-decoration: none;
            border: none; background: none;
        }

        .nav-item.active {
            color: var(--primary);
            border-top: 3px solid var(--primary);
        }

        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* PANTALLAS VACÍAS POR AHORA */
        .placeholder-view {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: #7f8c8d; flex-direction: column;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-tower-broadcast"></i>
                <strong style="font-size: 1.2rem;">CaranchoNET</strong>
            </div>
            <div style="font-size: 12px; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 10px;">
                <i class="fas fa-location-dot"></i> Tafí Viejo
            </div>
        </div>
        <div class="status-bar">
            <div class="status-item"><span>Señal:</span><b>EXCELENTE <i class="fas fa-signal"></i></b></div>
            <div class="status-item"><span>Modo:</span><b>ACTIVO</b></div>
            <div class="status-item"><span>Batería:</span><b>85%</b></div>
        </div>
    </header>

    <main>
        <!-- VISTA MENSAJES (CHAT) -->
        <section id="view-mensajes" class="view active">
            <div id="chat-container"></div>
            <div class="input-area">
                <input type="text" id="mensaje" placeholder="Escribe un mensaje..." autocomplete="off">
                <button class="send-btn" onclick="enviar()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

        <!-- VISTA TELEMETRÍA -->
        <section id="view-telemetria" class="view">
            <div class="placeholder-view">
                <i class="fas fa-chart-line fa-3x"></i>
                <p>Datos de sensores LoRa</p>
            </div>
        </section>

        <!-- VISTA MI CUENTA -->
        <section id="view-cuenta" class="view">
            <div class="placeholder-view">
                <i class="fas fa-user-circle fa-3x"></i>
                <p>Configuración de Perfil</p>
                <button onclick="borrarHistorial()" style="margin-top:20px; color:red; background:none; border:1px solid red; padding:5px 10px; border-radius:5px;">Borrar Historial</button>
            </div>
        </section>
    </main>

    <nav>
        <button class="nav-item active" onclick="switchView('mensajes', this)">
            <i class="fas fa-comment-dots"></i>
            Mensajes
        </button>
        <button class="nav-item" onclick="switchView('telemetria', this)">
            <i class="fas fa-sliders"></i>
            Telemetría
        </button>
        <button class="nav-item" onclick="switchView('cuenta', this)">
            <i class="fas fa-user"></i>
            Mi Cuenta
        </button>
    </nav>

    <script>
        const chat = document.getElementById('chat-container');
        const input = document.getElementById('mensaje');

        // NAVEGACIÓN ENTRE VISTAS
        function switchView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + viewId).classList.add('active');
            btn.classList.add('active');
        }

        // LÓGICA DE MENSAJERÍA PERSISTENTE
        window.onload = () => {
            const guardados = JSON.parse(localStorage.getItem('historial_carancho')) || [];
            guardados.forEach(msg => agregarMensajeALaPantalla(msg.texto, msg.tipo));
            chat.scrollTop = chat.scrollHeight;
        };

        function enviar() {
            const texto = input.value.trim();
            if(texto !== "") {
                agregarMensajeALaPantalla(texto, 'sent');
                
                const historial = JSON.parse(localStorage.getItem('historial_carancho')) || [];
                historial.push({ texto, tipo: 'sent', fecha: Date.now() });
                localStorage.setItem('historial_carancho', JSON.stringify(historial));

                input.value = "";
                chat.scrollTop = chat.scrollHeight;
            }
        }

        function agregarMensajeALaPantalla(texto, tipo) {
            const nuevoMsg = document.createElement('div');
            nuevoMsg.className = 'msg';
            nuevoMsg.style.alignSelf = (tipo === 'sent') ? 'flex-end' : 'flex-start';
            nuevoMsg.style.backgroundColor = (tipo === 'sent') ? '#27ae60' : 'white';
            nuevoMsg.style.color = (tipo === 'sent') ? 'white' : 'black';
            nuevoMsg.innerText = texto;
            chat.appendChild(nuevoMsg);
        }

        function borrarHistorial() {
            if(confirm("¿Borrar chat?")) {
                localStorage.removeItem('historial_carancho');
                location.reload(); 
            }
        }

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") enviar(); });
    </script>
</body>
</html>
