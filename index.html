<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería RN9 - LoRa</title>
    <!-- ESTA LÍNEA ES CLAVE PARA PWABUILDER -->
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px; border-radius: 15px; background: var(--accent); color: white; align-self: flex-end; }
        .meta { font-size: 0.7rem; opacity: 0.8; text-align: right; }
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <strong>Ruta LoRa - Mensajería</strong>
    <div id="status" style="font-size: 0.7rem;">Detectando...</div>
</header>

<div id="chat-container"></div>

<div class="input-area">
    <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
    <button onclick="enviarMensaje()">Enviar</button>
</div>

<script>
    const db = new Dexie("ChatRuta9");
    db.version(1).stores({ mensajes: '++id, fecha, texto, via' });

    async function cargarHistorial() {
        const historial = await db.mensajes.orderBy('fecha').toArray();
        historial.forEach(m => mostrarEnPantalla(m));
    }

    function mostrarEnPantalla(m) {
        const div = document.createElement('div');
        div.className = 'message';
        const hora = new Date(m.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        div.innerHTML = `<div>${m.texto}</div><div class="meta">${hora} • via ${m.via}</div>`;
        document.getElementById('chat-container').appendChild(div);
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    }

    async function enviarMensaje() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        const msg = { texto: input.value, fecha: Date.now(), via: navigator.onLine ? "Internet" : "LoRa" };
        await db.mensajes.add(msg);
        mostrarEnPantalla(msg);
        input.value = '';
    }

    // REGISTRO DEL SERVICE WORKER (Para PWABuilder)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(reg => console.log('SW registrado', reg))
                .catch(err => console.log('Error SW', err));
        });
    }

    cargarHistorial();
</script>
</body>
</html>
